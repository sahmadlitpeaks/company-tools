# Single-origin front door: serve the built SPA and reverse-proxy everything
# the backend owns to http://backend:8000 (the compose service name).
server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Don't drop the host:port when issuing redirects (e.g. behind a mapped port).
    absolute_redirect off;
    # Allow large uploads (secure transfers, brochures, assets).
    client_max_body_size 110M;

    # The SPA's "Marketing Assets" page used to live at /assets, which collided
    # with Vite's /assets/ build directory. Redirect old links to the new route.
    location = /assets {
        return 301 /marketing-assets;
    }

    # ---- Backend-owned paths ----
    location /api/ {
        proxy_pass http://backend:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Public short-link redirects: https://host/s/{code}
    location /s/ {
        proxy_pass http://backend:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Dynamic QR scan redirects: https://host/q/{id}
    location /q/ {
        proxy_pass http://backend:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Uploaded media served by the backend.
    location /media/ {
        proxy_pass http://backend:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # API docs / schema.
    location /docs {
        proxy_pass http://backend:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /openapi.json {
        proxy_pass http://backend:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location = /health {
        proxy_pass http://backend:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # ---- SPA: everything else falls back to index.html ----
    location / {
        try_files $uri $uri/ /index.html;
    }
}
